name: tagged-release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build mod zip
        run: |
          MOD_NAME="${{ github.event.repository.name }}"
          ARCHIVE="${MOD_NAME}.zip"
          DEST="package/${MOD_NAME}"

          mkdir -p "${DEST}" dist

          cp -r locale locale-align "${DEST}/"
          cp changelog.txt info.json LICENSE.txt README.md thumbnail.png "${DEST}/"
          cp data-final-fixes.lua "${DEST}/"

          (cd package && zip -r "../dist/${ARCHIVE}" "${MOD_NAME}")
          echo "archive=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.archive }}
          generate_release_notes: true
