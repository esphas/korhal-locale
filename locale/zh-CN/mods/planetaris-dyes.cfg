dye-enable-pipes=[img=red-pipe-icon] 启用染色管道
dye-enable-wall=[img=green-stone-wall-icon] 启用染色墙壁
dye-enable-stone-path=[img=blue-stone-brick-icon] 启用染色石砖
dye-enable-concrete=[img=red-concrete-icon] 启用染色标准混凝土
dye-enable-refined-concrete=[img=blue-refined-concrete-icon] 启用染色钢筋混凝土
dye-enable-hazard-concrete=[img=green-hazard-concrete-icon] 启用染色标准混凝土（标识）
dye-enable-refined-hazard-concrete=[img=red-refined-hazard-concrete-icon] 启用染色钢筋混凝土（标识）

disable-gleba-recipe-surface-conditions=[planet=gleba] 禁用句芒星配方地表条件
dye-early-unlock=仅使用 [planet=nauvis] 新地星科技包即可解锁染料
