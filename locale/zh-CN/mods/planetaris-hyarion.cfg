[tips-and-tricks-item-description]
hyarion-briefing=[planet=hyarion] 一颗由晶体与熔岩构成的行星，折射光线从天而降，摧毁地表。\n可通过将废弃物直接移入 [tile=lava] 来清除。\n海里昂拥有专属的火箭发射井与部件配方。
hyarion-refraction=[planet=hyarion] 拥有独特的产能方式。\n使用 [entity=planetaris-big-refraction-ray-collector] 收集 [fluid=planetaris-refraction-light]，再通过放置 [entity=planetaris-fiber-optics-cable] 将其输送至 [entity=planetaris-refraction-plant]。\n在 [item=planetaris-fluorite] 与 [fluid=planetaris-refraction-light] 的作用下产出 [fluid=planetaris-pure-light]，可在 [entity=planetaris-refraction-generator] 中用于发电。\n此外，还可生产 [item=planetaris-charged-fluorite]，将折射产能带到任意地点。
hyarion-unstable-gem=[item=planetaris-unstable-gem] 是比 [item=cliff-explosives] 更好的选择，具有更大的范围与伤害。

