# mod: condensing-agricultural-tower
# version: 1.1.1

[mod-name]
condensing-agricultural-tower=冷凝农业塔 [Condensing agricultural tower]

[mod-description]
description=新增冷凝农业塔：在附近地块自动化种植作物，收获时可通过冷凝额外产出流体，并存入塔内储罐。

[entity-name]
condensing-agricultural-tower=冷凝农业塔
hidden-condensing-agricultural-tower-tank=冷凝农业塔储液罐

[entity-description]
condensing-agricultural-tower=在附近地块播种并收获作物；每次收获时，除常规收获物外，还会冷凝流体并存入塔内储罐。储罐满后多余流体将无法储存。详见异星工厂百科。
hidden-condensing-agricultural-tower-tank=储存收获时冷凝获得的流体，容量上限 30k。

[factoriopedia-description]
condensing-agricultural-tower=在附近地块播种并收获作物；每次收获时，除常规收获物外，还会冷凝流体并存入塔内储罐。储罐满后多余流体将无法储存。
condensing-tree=\n收获[entity=tree-plant]时可冷凝出 2000 [fluid=water]（153.3/秒）
condensing-yumako=\n收获[entity=yumako-tree]时可冷凝出 810 [fluid=steam]（165 °C）（62.1/秒）
condensing-jellynut=\n收获[entity=jellystem]时可冷凝出 420 [fluid=lubricant]（32.2/秒）

[mod-setting-name]
enable-tree-condensing-water=启用[entity=tree-plant]冷凝产水
enable-jellynut-condensing-lubricant=启用[entity=jellystem]冷凝产润滑油
enable-yumako-condensing-steam=启用[entity=yumako-tree]冷凝产高温蒸汽

[mod-setting-description]
enable-tree-condensing-water=收获[entity=tree-plant]时可冷凝出 2000 [fluid=water]（153.3/秒）
enable-jellynut-condensing-lubricant=收获[entity=jellystem]时可冷凝出 420 [fluid=lubricant]（32.2/秒）
enable-yumako-condensing-steam=收获[entity=yumako-tree]时可冷凝出 810 [fluid=steam]（165 °C）（62.1/秒）
