[tips-and-tricks-item-description]
pelagos-briefing-main=[planet=pelagos] 是一座岛屿密布的世界，热带 [entity=coconut-palm]、[entity=methane]、[entity=iron-ore] 与 [entity=fish]、[entity=copper-biter-spawner]（本地铜来源）等小型生物丰富。采集椰子，提炼油脂、密封剂与生物燃料，尝试发酵，并用高温 [entity=calciner] 精炼原材料。
pelagos-coconuts-and-oil=从 [entity=coconut-palm] 采摘椰子。椰肉可加工成 [fluid=coconut-oil] 或制成 [item=coconut-sealant]，用于造船或充当燃料。
pelagos-calciners=[entity=calciner] 可在高温下提纯并转化原材料。\n煅烧炉消耗任意含「燃料值」的流体，如 [fluid=crude-oil]、[fluid=methane]、[fluid=coconut-oil] 或 [fluid=ethanol] 等。\n燃料值越高，所需消耗越少。可用于椰壳、木材、鱼类等需高温加工的资源。
wooden-platform=[item=wooden-platform] 是模块化水面建筑，可在水上放置指定机器与基础设施，将工厂扩展至湖泊、河流或海洋，但仅支持轻量稳定结构。\n支持对象：\n- [entity=pipe]\n- 装桶机\n- [entity=radar]\n- 各类机械臂\n- 传送带\n- 物流/仓储箱\n- 电路网络设备（运算器、灯等）\n- 机枪炮塔\n- [entity=flamethrower-turret]\n- 火箭炮塔\n- [entity=pump]（不含柴油泵）
electromagnetic_waves=每台电力机器与发电机都会发出不可见的电磁波。\n这些辐射与干扰代表电力使用产生的排放。不同地表吸收率各异——水面几乎不吸收，沙地则缓慢中和。\n碧屿星的巢穴与生物能够侦测并反应：电网越庞大，它们越容易被惊动。建设大型耗电工厂时务必留意，或改用柴油动力设备以求安全。

