[item-description]
luciferin=发出柔和蓝绿荧光的生物发光粉末，用于高级储能与光学应用。
lucifunnel=生物发光植物，纤巧漏斗形叶片泛空灵蓝绿光。卷曲卷须与繁复叶纹在暗处如珊瑚异卉般摇曳；于弱光环境散发幽光，招引夜行传粉者，为四周镀上神秘光晕。
lucifunnel-seed=罕见的发光种子，泛柔和蓝绿荧光，培育生物发光植物所必需。
quartz-ore=闪亮晶质矿物，常见于崎岖岩土矿脉，适于合成与工业用途。
quartz-crystal=清澈玻璃质矿物，棱面锐利，因美观与耐用而广泛用于合成与工业。
chitin=取自外骨骼的坚韧层状材料，以强韧著称。
tenecap=暗哑棕褐蘑菇。
tenecap-spore=采自暗盖菇的一小束孢子。
chitosan=由甲壳素精炼而成的轻质材料，柔韧而耐用。
biobeacon=注入生物发光能量的信标，除标准信标可接受的各类插件外，还可接受 [item=productivity-module]。

