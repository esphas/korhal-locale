tenebris-briefing=特暗星导览

[tips-and-tricks-item-description]
tenebris-briefing=[planet=tenebris] 永罩黑暗，太阳能无效，夜视亦无法使用。星球上遍布蜈蚣，强壮且带毒，只要不挡其去路便不会主动攻击。星球能源依赖 [item=luciferin]——可造出无需电力即可运转的生物发光机械。货运舱着陆时常因导航失败而损毁，或许可借助在此研究出的技术加以规避？\n\n需用 [entity=bioinfusor] 为机械灌注生物发光特性，使其在无电力情况下运作。

