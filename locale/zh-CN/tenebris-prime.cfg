# mod: tenebris-prime
# version: 1.3.9

[mod-name]
tenebris-prime=○🌐特暗星-分支 [Tenebris Prime]

[mod-description]
tenebris-prime=○🌐新增黑暗星球特暗星，浓酸大气终年蔽日。原 Tenebris mod 的分支版。

[space-location-name]
tenebris=特暗星

[space-location-description]
tenebris=一颗神秘的黑暗星球，因厚重吸光大气而永罩阴影。地表稀疏点缀生物发光的动植物，在无日光处繁衍生息，于紫与深蓝的景观上投下微光。特暗星严酷而诡谲，唯有技术与光能支撑你在永恒昏暗中求生。

