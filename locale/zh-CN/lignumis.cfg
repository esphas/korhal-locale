[tips-and-tricks-item-description]
lignumis-briefing=[planet=lignumis] 是 [planet=nauvis] 的一颗卫星，你必须逃离它才能接触更先进的科技。主要资源为 [item=wood]、[item=gold-ore]、[item=peat] 与 [item=stone]。该卫星缺乏铁与铜，因此选择有限，看似不太值钱的 [item=gold-ore] 是唯一可用金属。在你逃离之前，电力尚未被发现。\n\n[img=utility/warning_icon] 愈创星会通过修改原版配方与科技影响其余游戏。请查看 mod 设置以按喜好调整，或在 mod 门户安装导演剪辑版（Director's Cut）以获得完整体验。
lignumis-burner-agriculture=与更先进的电力版本相比，同时向农业塔供应种子与燃料需要更精巧的设计。由于引擎限制，若燃料在传送带错误一侧，机械臂会持续抓取种子而忽略燃料。使用电路或多个机械臂可彻底避免此类问题。
lignumis-noise=[planet=lignumis] 上的土著对 [img=airborne-pollutant/noise] 巨大噪声很敏感。你制造的任何机械都可能相当吵闹。保持基地紧凑，并用墙体把噪声关在内部。\n降低噪声的工具：[img=item/wooden-wall] 墙、[img=entity/tree-01] 树、[img=item/efficiency-module] 效率插件、[item=active-noise-cancelling-tower]。
lignumis-steam=[entity=steam-assembling-machine] 与 [entity=steam-inserter] 让你能建造更快、更紧凑的生产线。由于缺乏更好的科技，在 [entity=desiccation-furnace] 中燃烧 [item=moist-stromatolite-remnant] 是获取 [fluid=steam] 的唯一来源。可在普通熔炉中燃烧多余的湿叠层石残余物以平衡蒸汽。\n\n[img=utility/warning_icon] [fluid=steam] 产量不足以支撑整个基地运转。尽可能保留旧的热能布局。
lignumis-escaping=[entity=provisional-rocket-silo] 可让你携带大量物品离开。尽量打包基础设施物品，以便在新地星快速起步。燃料、黄金与科技包请留下。\n\n[img=utility/warning_icon] 离开前不必研究全部科技，但最好研究充分，或至少确保离开后仍能继续研究。\n[img=utility/warning_icon] 你离开后基地仍会产生噪声，敌人也会继续扩张。离开前务必做好防护。
