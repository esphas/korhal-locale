lignumis-ammo-progression=标准弹匣需要木镖弹匣制作。
lignumis-technology-progression=为大多数后期科技添加木制与蒸汽科技包。关闭后愈创星科技包在后期将失去意义。
lignumis-basic-circuit-board=新游戏请启用。此选项未来将成为强制项。
lignumis-circuit-progression=电子电路需要基础电路板来制造。
lignumis-assembler-progression=组装机 1 需要热能组装机来制造。
lignumis-lumber-mill-more-recipes=木材加工厂还可制造基础炮塔、热能组装机与热能机械臂。在启用全部递进配方时有助于平衡木材消耗，并利于马拉松档。
lignumis-fulgora-wood=在废料回收中添加木齿轮作为木材主要来源。若你有其他木材来源或从其他星球进口一切，可关闭。
lignumis-early-robots=个人机器人从蒸汽科技移至木制科技，且略快一些。
lignumis-lab=将传送带配方移至物流研究，研究中心配方使用木制传送带，以便登陆新地星后即可制造。
lignumis-double-rocket=临时火箭可携带 80 而非 40 格物品。
lignumis-sciences-spoil=木制与蒸汽科技包均会变质，增加难度。
lignumis-infinite-astroponics-productivity-research=太空农业的产能研究为无限级，而非上限 5 级（50% 产能）。
lignumis-electric-lumber-mill=木材加工厂消耗电力而非燃料，并在研究电力后解锁。
lignumis-k2so-gold-tech-card=本需木制与蒸汽科技包的后期科技改为需要由愈创星黄金制造的黄金科技卡。需启用递进科技。

