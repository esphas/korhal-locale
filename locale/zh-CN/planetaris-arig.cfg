[tips-and-tricks-item-description]
arig-briefing=[planet=arig]是一颗炎热的星球，拥有广阔的沙漠，其仅有的珍贵资源只能在地下或[tile=arig-sand]中通过[entity=offshore-pump]获取。持续的沙尘暴使[entity=roboport]无法正常使用，且大部分地表若不铺设[item=planetaris-sandstone-foundation]则不适合建造。\n基础资源可在[entity=planetaris-sifter]中筛分[fluid=planetaris-sand]获得。\n可将废弃物品直接丢入[tile=arig-sand]来清除。\n该星球的货物投放功能在研究完成前处于锁定状态（[item=construction-robot]除外）。
arig-exploring=在沙地上行走有时非常吃力，记住吃仙人掌是加速移动的好办法！不过要小心刺。
rail-support-deep-sand=研究[technology=rail-support-foundations]后，可在[tile=arig-deep-sand]上建造轨道支撑。

