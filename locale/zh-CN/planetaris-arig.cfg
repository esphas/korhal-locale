[mod-name]
planetaris-arig=○🌐天文无界:阿里格 [Planetaris: Arig]

[mod-description]
description=一颗炎热的星球，拥有广阔的沙漠，其仅有的珍贵资源只能在地下或沙层中找到。持续的沙尘暴使机器人无法正常使用，且大部分地表若不铺设合适的地基则不适合建造。（警告：该星球的货物投放功能在研究完成前处于锁定状态）

