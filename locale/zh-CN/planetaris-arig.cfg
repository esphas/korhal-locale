[technology-description]
planet-discovery-arig=一颗炎热的星球，拥有广阔的沙漠，其仅有的珍贵资源只能在地下或沙层中找到。持续的沙尘暴使机器人无法正常使用，且大部分地表若不铺设合适的地基则不适合建造。（警告：该星球的货物投放功能在研究完成前处于锁定状态）
planetaris-cactus-wood=用仙人掌制造木材。
planetaris-sand-sifting=筛分阿里格的流沙以获取基础资源。
planetaris-raw-diamond-production=允许压缩钻石原矿。
planetaris-compression=压缩材料以制造新物品。
planetaris-glass=允许制造玻璃。
planetaris-heavy-glass=允许制造厚玻璃。
planetaris-compression-science=允许深入研究压缩技术。
planetaris-advanced-sand-sifting=允许筛分方解石和更多纯净沙。
planetaris-sandstone-foundation=允许在阿里格的沙地上建造。
planetaris-simulating-unit=允许制造模拟单元。
planetaris-big-chest=为物品和物流系统提供更大的储存空间。
planetaris-Logistics-4=更快的传送带。
planetaris-automation-4=更快的组装机。
planetaris-arig-roboport=允许在阿里格建造抗尘机器人指令平台。
planetaris-advanced-solar-panel=效率是基础太阳能板的两倍。
planetaris-supported-solar-panel=专用于在液体和不稳定地表上建造的太阳能板和小型电线杆。
planetaris-water-harvesting=能从大气湿度中生产水的机器。

