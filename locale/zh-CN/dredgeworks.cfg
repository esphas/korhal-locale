# mod: dredgeworks
# version: 0.8.17

[mod-name]
dredgeworks=疏浚工程 [Dredgeworks]

[dredgeworks]
floated=__1__（浮动）
submerged=__1__（水下）
submerged-desc=水面以下的矿石。填海或铺设其他地表覆盖物将永久清除它们。
refined-concrete-pricy=可在水上建造。作为地格铺设需要 (__1__) 个。

[entity-name]
light-buoy=照明浮标
deep-iron-ore=水下铁矿
deep-copper-ore=水下铜矿
deep-uranium-ore=水下铀矿
deep-stone=水下石头
deep-coal=水下煤
wire-buoy=线缆浮标
seafloor-drill=海床采矿机
floating-belt=浮动传送带

[entity-description]
wire-buoy=电杆的水上对应物。无法放置在陆地上。
seafloor-drill=为海洋使用改造过的采矿平台。可开采范围内的水下或冲岸矿石。
flotation-platform=可固定在某些设备上，使其浮于水面。

[item-name]
flotation-platform=浮台

[item-description]
refined-concrete=可在水上建造。
refined-hazard-concrete=可在水上建造。

[recipe-name]
flotation-platform-wood=木材制浮台

[recipe-description]
flotation-platform-wood=不用塑料制作效率较低。

[technology-name]
wire-buoy-technology=__ENTITY__wire-buoy__s
floating-logistics-technology=水上物流
floating-drill-technology=__ENTITY__seafloor-drill__s

[technology-description]
wire-buoy-technology=用于配电的浮动结构。
floating-logistics-technology=为物流设备加装浮台，使其可在水面运作。
floating-drill-technology=开采水面下的资源。

[mod-setting-name]
refcrete_default_fill=钢筋混凝土为默认填海材料
seafloor_drill_beltstack=海床采矿机输出堆叠
concrete_placement_cost=钢筋混凝土铺设消耗
shallow_oil_concrete=[planet=fulgora]雷神星浅海允许铺设钢筋混凝土
allow_floating_edgecase=允许水上生成特殊矿脉
limit_belt_flotation=限制浮动传送带生成
limit_inserter_flotation=限制浮动机械臂生成

[mod-setting-description]
refcrete_default_fill=启用后，在无底层地格的蓝图上向非固体表面放置时，将使用钢筋混凝土而非填海材料。
seafloor_drill_beltstack=启用且已安装太空时代时，海床采矿机将按传送带容量堆叠输出矿石（类似大型采矿机）。
concrete_placement_cost=铺设一格地格需要消耗多少个钢筋混凝土。默认提高以平衡海上建造成本；设为 0 则不影响消耗。
shallow_oil_concrete=是否允许在雷神星较浅的海域铺设钢筋混凝土。未安装太空时代时可忽略。
allow_floating_edgecase=启用后，非流体且非基础固体的资源（例如 Krastorio 2 的异星晶）也会生成在水面。
limit_belt_flotation=仅为原版传送带生成浮动版本。若某 mod 的传送带与疏浚工程浮动机制不兼容，请启用此项。
limit_inserter_flotation=仅为原版机械臂生成浮动版本。若某 mod 的机械臂与疏浚工程浮动机制不兼容，请启用此项。
