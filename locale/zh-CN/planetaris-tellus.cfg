[tips-and-tricks-item-description]
tellus-briefing=[planet=tellus]是一颗被细菌和寄生虫感染的星球，大气中的花粉帮助 [entity=small-wasp] 传播并影响部分材料；深入研究泰勒斯科技或许能找到解决方案。\n叶绿质与菌丝可使用 [entity=condensing-agricultural-tower] 培育，并在 [entity=planetaris-bioassembler] 中加工。\n你在那里找不到 [entity=iron-ore]、[entity=copper-ore]、[entity=crude-oil]、[entity=coal] 和 [entity=uranium-ore]，但植物提供了获取所需物品的替代途径。\n大多数农业产物都面临随时间变质的额外挑战。就连 [item=planetaris-bioengineering-science-pack] 也有有限保质期，无法大量囤积。此外，病理学材料变质时还会生成敌人，例如 [item=planetaris-pathological-science-pack] 变质后会爆炸生成 [entity=big-wasp]。
tellus-bioassembler=[entity=planetaris-bioassembler] 可用于制造泰勒斯专属的加工流程与材料。\n[entity=planetaris-bioassembler] 是活体，需用 [item=planetaris-bioassembler-seed] 种在任何天然地面上。像所有植物一样，[entity=planetaris-bioassembler] 会死亡；要在其分解前投喂 [item=nutrients] 以复活。\n[entity=planetaris-bioassembler] 可由 [entity=construction-robot] 放置。
tellus-roots=管道易被花粉腐蚀，泰勒斯机械无法连接 [entity=pipe]，你需要用 [entity=planetaris-root] 输送流体。可用 [entity=planetaris-root-filler] 将管道中的流体注入根脉。

