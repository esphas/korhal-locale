[tips-and-tricks-item-name]
data-pollution-items=数据污染物品（第 __1__ 页）
castra-briefing=[planet=castra]勾陈星导览
castra-lithium-supply=[item=lithium-battery]锂供应

[tips-and-tricks-item-description]
castra-briefing=[planet=castra] 是一片军事化荒原，敌对派系会研究并镜像你的科技，随时间不断强化防御。\n\n[entity=data-collector] 基地会排放数据污染，并周期性掉落 [item=castra-data]——请尽快收集，它们会在一分钟内变质。数据汇集环运作越久，基地就越会升级，新增炮塔、墙体、机器人指令平台与太阳能板。\n\n在敌人数据汇集环附近部署 [entity=jammer-radar]，可消耗数据污染并减缓基地升级与物品生成。\n\n[item=millerite] 是主要矿石，加工为 [item=nickel-plate] 镍板，用于大部分本地配方。[fluid=hydrogen-sulfide] 从 [entity=hydrogen-sulfide-vent] 提取。[item=gunpowder] 矿脉可直接开采。用 [entity=offshore-pump] 可抽取 [fluid=light-oil] 轻油海洋。另有 [item=copper-ore] 与 [item=uranium-ore]。\n\n[entity=forge] 是行星专属制造建筑，自带产能与品质加成。解锁需加工勾陈星三种独特资源，且制造 [item=battlefield-science-pack] 离不开它。
castra-lithium-supply=[planet=castra] 没有锂。要生产 [item=lithium-battery]，需从其他星球进口 [item=lithium]，或出口 [item=nickel-plate] 在外星制造电池。

