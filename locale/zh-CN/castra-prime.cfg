[mod-setting-description]
castra-prime-forge-glow=启用锻造厂工作时的发光图层。
castra-prime-extend-data-spoilage=将战场数据包的保质期从 1 分钟延长至 5 分钟。
castra-prime-disable-artillery=阻止敌人基地建造炮塔。建议长时间存档启用。
castra-prime-buffed-forge=将锻造厂制造速度提升至 3.0、产能加成提升至 50%，并将能耗降至 2.5MW。
castra-prime-gates-progression=启用后（默认），勾陈星资源为后期进程所必需：制造轨道炮与钷素科技包需要锂电池，钷素科技与研究产能科技需要战场科技包。关闭后勾陈星变为可选副星球。
castra-prime-suppress-research-msg=隐藏敌人研究进度消息，适合希望减少打扰、更沉浸的玩家。
castra-prime-research-rate-multiplier=敌人派系研究速度的倍率。默认 1.0 与原版相同；小于 1.0 减慢，大于 1.0 加快。范围 0.01–100。注意：引擎对敌人研究有限制，提高倍率可能无法按预期生效。
castra-prime-nauvis-nukes=启用后，原子弹科技不再要求战场科技包，无需造访勾陈星即可研究。
castra-prime-buff-equipment=强化本 mod 的能量盾 MK3（450 生命值、18/秒回复、300kW 功耗）与电池 MK3（300MJ 容量）。关闭则使用原版数值。
castra-prime-disable-enemy-nukes=阻止敌人炮塔装填核弹药：火箭炮塔中的原子弹与氢弹，以及炮塔中的核炮弹（Cerys/Maraxsis）。已装填的核弹药会保留至射完，不会从炮塔中移除。
castra-prime-disable-land-mines=不会移除已有的地雷。
castra-prime-nerf-enemy-bases=所有敌人数据汇集环的生命值、抗性与回复速率降低 50%。

