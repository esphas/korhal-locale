[tips-and-tricks-item-description]
moshine-briefing=[planet=moshine] 是一颗炎热的火山星球，富含 [item=sand]（可解锁 [item=silicon] 与 [item=glass]）和 [item=neodymium]（制造 [item=magnet] 的良好基础）。这里酷热难当，难以建造 [entity=accumulator]，但幸运的是各地都有 [entity=steam-geyser]。建议至少携带一座 [entity=foundry]，以便从铁湖中转化 [fluid=molten-iron]。可通过煤炭液化制造 [fluid=crude-oil]。
