[technology-description]
planet-discovery-moshine=一颗阳光普照的星球，富含钕、硅与太阳能。一些神秘的坠毁探测器中蕴藏着丰富的知识，我们可以借此拓展人工智能的边界。
moshine-concrete-from-molten-iron-and-sand=用熔铁和沙子制造混凝土。
moshine-petroleum-from-sand-sulfur-steam-carbon=用沙子、硫和煤炭制造石油气。
moshine-tech-silicon=可将沙子转化为硅。
moshine-tech-glass=熔炼沙子可得到玻璃。
moshine-tech-silicon-cell=硅电池是电脑的重要组成部分。
moshine-tech-silicon-carbide=碳化硅可用作强大的绝缘体。
moshine-tech-magnet=将钕和铁加工成强力磁铁。
moshine-tech-datacell-empty=可进行数据处理，并将数据存入数据单元。
moshine-tech-data-processor-building=数据处理器转换数据并处理与数据相关的任务。
moshine-tech-neural_computer=神经计算机通过处理海量信息发现新知。
moshine-tech-data-extractor=允许从灼原星上坠毁的探测器中取回数据。
moshine-tech-3d-data-storage=全息核心是承载复杂 AI 模型并进行训练的最佳方式。
moshine-tech-data-processor=可制造复杂的人工智能，但请注意：其初始形态具有爆炸性。
moshine-tech-ai-trainer=AI 模型可通过自我学习优化，进而达到前所未有的研究水平。
moshine-tech-ai-tier=训练效能呈指数级提升的 AI 核心。
moshine-tech-processing-grid=处理极其复杂的运算。
tech-space-trains=载货量更大、速度更快的磁悬浮列车。
minimalist-rails=由灼原星矿物制造的更强轨道，可传输电力。
minimalist-elevated-rails=钕轨的高架版本。

