[rubia-lore]
rubia-notice-prestring=（荆岚星）
spidertron-mine-hint-part1=在这台蜘蛛机甲残骸内，你发现一种奇怪的细菌，它似乎在消耗这种磨损的材料。你将其命名为__ITEM__rubia-bacteria-A__。
spidertron-mine-hint-part2=你无法停止思考第一个蜘蛛机甲残骸。你受到启发，想要建造一门大型火炮，它能[font=compi]将不需要的物品射到风中[/font]。你将自己的设计称为[font=compi]"__ENTITY__crapapult__"[/font]，并为自己天才的双关语轻声发笑。
spidertron-mine-part1=这台蜘蛛机甲上有一个物流请求，分配给某种立方体。
spidertron-mine-part2=这台蜘蛛机甲的货物中包含一张磨损的"Contem□□□□□on卡"。由于无法使用，你将其抛回风中，再也未见。
spidertron-mine-part3=这台蜘蛛机甲有一张磁盘，上面写着"Fas□□□ □□□n Light Th□□□□: □□rt C"。它已损坏无法修复，最终在你的物品栏中碎裂。
spidertron-mine-part4=从你搜集的所有蜘蛛机甲来看，很明显，那个立方体如果曾经存在过，肯定已不在这个星球上。
spidertron-mine-destroyer-trap=翻找这台蜘蛛机甲时，你意外触发了里面的防御机器人胶囊。
spidertron-mine-destroyer-trap-2=你想知道荆岚星上发生了什么，才需要建造那些防御机器人。
train-stop-mine-part1=这个生锈的火车站台上有一张破旧的便条："我搞砸了比例。请修复——Trangar"
train-stop-mine-part2=这个柱子上只有"ZIGGURAT"这个词被反复刻下。
train-stop-mine-part3=这个火车站台曾被称为"Grak Pack"。
train-stop-mine-part4=这个柱子上有一张Boskid的便条，详细记录了他试图阻止raiguard发现其意大利面占卜术的努力。
train-stop-mine-part5=在这处火车站台下，你发现一本破书：《肛门占卜学：论褶皱与皱纹的解读》。
train-stop-mine-part5-2=草草翻了几页，风把它从你手中扯走。你想能不能在网上找到新副本。
train-stop-mine-part6=残骸里困着一段录音，但无法辨识。你把数据传回主基地分析。
train-stop-mine-part6-2=早前找到的录音分析完成。记录显示曾修建一条巨大铁路线以抵达「世界尽头」。不清楚「Zyl□□□□」是否成功。
train-stop-mine-part7=你发现一批提议「使风无效」的技术文档。上面有粪便涂抹的痕迹，可能是某位恼怒的收件人留下的。
train-stop-mine-part8-rand1=这处站台有个「jivolite」盒子。嫉妒别人先给这矿物起了更俗的名字，你愤怒地捏碎了盒子。
train-stop-mine-part8-rand2=这处站台有个「bobmonium」盒子。你愤怒地捏碎它，嫉妒别人起了比你更俗的名字。
train-stop-mine-part8-rand3=这处站台有个「immersite」盒子。你惆怅地丢弃它，知道本可以起个更好笑的名字。
train-stop-mine-part8-rand4=这处站台有个「stupidium」盒子。你对自己咯咯笑，满意于这元素的愚蠢名字。
train-stop-mine-part8-rand5=这处站台有个「nexelit」盒子。它看起来比想象复杂得多，你小心地退开。
train-stop-gun-turret-trap=在垃圾中翻找时，你发现瓦砾下有一座炮塔，标着「□□□□erty of Bob」。你的笨拙操作让它启动。
;junk-mine-hint-part1=Combing through the wreckage gives you inspiration for a large gun to shoot unwanted items out into the wind. You call your design the __ENTITY__crapapult__.
junk-mine-part1=在这堆垃圾中，你发现一张「Fr□□□」的破旧蓝图，正着看毫无意义，直到你把它旋转 45 度。你生气地扔掉了它。
;In this pile, you see a broken pump with a filter set to a fluid you've never seen before.
junk-mine-part2=这堆垃圾中包含一件署名为"HideBoar"的艺术品。你将其安全收起来，以免他人评头论足。
junk-mine-part3=这堆垃圾中有一条评论："沧海星：7/10。水太多。"你很困惑，但仍不认同。
junk-mine-part4-rand1=你找到一个破碎的相框。背面写着"Jul□□□, □□ali, Lo□□, and □□ppy"。照片已刮花无法辨认。
junk-mine-part4-rand2=你找到一个破碎的相框。背面写着"□□□vik, Ju□□□□, □□garre, and Buf□□□"。你不认识这些人，但希望他们一切安好。
junk-mine-part4-rand3=你找到一个破碎的相框。背面写着"De□□□□□r, □0X, □□□□hiri, and □earw□□□"。照片已刮花无法辨认。
junk-mine-part4-rand4=你找到一个破碎的相框。背面写着"□oj□, □□□itri, Fox□□□□"。你想知道这些人是否还认识彼此。
junk-mine-part4-rand5=你找到一个破碎的相框。背面写着"Grak□□□□, □□□□eymint, Ma□□, □□□□wuka"。照片有一股淡淡的披萨味。
junk-mine-part4-rand6=你找到一个破碎的相框。背面写着"Be□□□, □□□cado, Recor□□□, □□□box"。你不认识他们，但希望他们过得不错。
junk-mine-part5=这堆垃圾中有一块"greel"。它看起来暂无用处，但你能看出它的制作耗费了不少时间。
junk-mine-part6-rand1=你找到一把破损的吉他。背面签着"□□□□□□ Dan"。这把吉他曾被珍爱。
junk-mine-part6-rand2=你找到一把破损的吉他。背面签着"JJ"。上面有淡淡的装饰色彩痕迹。
junk-mine-part6-rand3=你找到一把破损的吉他。背面签着"□□□□□rat"。它已严重磨损。
junk-mine-part7=这堆垃圾里有个硬如石头的甜甜圈，包装已撕破，收据写着「Lau□□□□」。真残忍……霉菌让它没法吃了！
junk-mine-grenade-trap=这处残骸有个标着「□□ig□□□□/□□_□rt」的盒子。你冒失打开，物品弹了出来。
junk-mine-grenade-trap-2=盒中一切都被爆炸摧毁，包括一些文件。内容显然仅供他们亲阅。
all-lore-done=你认为不会再发现更多来自过去的有趣信息了。
;deprecated=Symbols were carved into this train stop: "🦶📸🍆💦". You don't know what it means, but still feel disgusted.

[rubia-taunt]
forgot-roboport-failsafe=(Loup&Snoop) 你忘了带机器人指令模块到荆岚星。检查一下物品栏。
forgot-roboport-failsafe-part2=(Loup&Snoop) 而且那个机器人指令平台不是免费的。我要吃掉你的左腿作为补偿。
rubia-first-blast-off-part1=(荆岚星) 于是工程师乘坐他的破烂火箭升空，渴望发现更多材料和行星，兴奋地想给它们起比荆岚星更糟糕的名字。
rubia-first-blast-off-part2=(荆岚星) 宇宙中确实没有任何地方能免受这个威胁。
rubia-first-blast-off-part3=(Loup&Snoop) 恭喜你征服荆岚星。我一直都怀疑你。
rubia-first-blast-off-part4-mp=（Loup&Snoop）哦，我明白了。感谢各位好心把 __1__ 抬过终点。没有你们他走不到这一步。
rubia-first-blast-off-part5-mp=（Loup&Snoop）不，真的。__1__ 挂机超过一小时，而其他人干了大部分活。
;WIP (unused)
rubia-shield-warning-convo-part1=(exfret) 他绝对想不明白。他太蠢了。
rubia-shield-warning-convo-part2=(Loup&Snoop) 我愿意相信。
rubia-shield-warning-convo-part3=(exfret) 他肯定会摔成渣，笑死我了。
rubia-shield-warning-convo-part4=(Loup&Snoop) 不不不。他会回头的。看着吧！

[version-change-warnings]
rubia-trashsteroid-health-scaling=（Loup&Snoop / 荆岚星）那个……别生气，但我修了个 bug：垃圾小行星生命值没随物理伤害科技涨到该涨的程度……完全可以理解！另外我在 Mod 设置 => 地图设置 里加了难度选项。若基地突然炸飞，请用那个。祝好运！
rubia-craptonite-wall=（Loup&Snoop / 荆岚星）好消息！废岩墙在最近更新中加强了。详见其科技或提示与技巧。
rubia-craptonite-wall-recipe=（Loup&Snoop / 荆岚星）注意：废岩墙配方已更改，荆岚星专用钢筋混凝土配方已移除。
rubia-factorissimo-destruction_warning=（荆岚星）荆岚星上的 Factorissimo 工厂将在 __1__ 分钟后被摧毁。降级会导致崩溃。
;rubia-factorissimo-destruction-position=Factorissimo factories on Rubia moved to: [gps=__1__,__2__,__3__]
rubia-bzmod-silo-recipe-change=（荆岚星）警告：荆岚星刚更改了 BZ mod 包的火箭发射井配方。基础发射井配方再次需要焊料。
rubia-tangible-projectile-mod-warning=（Loup&Snoop / 荆岚星）警告：你正在使用使子弹成为实体投射物的 mod（distant misfire）。这会让荆岚星比设计意图难得多。
rubia-tech-cost-multiplier-warning=（Loup&Snoop / 荆岚星）注意：你启用了科技成本倍率，但荆岚星触发科技默认为 x1。它们有独立的倍率设置（启动设置中）。完全可选——只是告知。此消息不再出现。

