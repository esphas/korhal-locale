rubia=[color=green]○🌐探索风之星球-荆岚星。[/color]\n你的工厂必须随波逐流，因为源源不断的垃圾正朝你的基地袭来。传送带和机械臂在荆岚星上的工作方式不同，能给你带来其他星球上从未见过的独特挑战

