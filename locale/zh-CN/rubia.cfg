on-player-died-on-entry=你因进入行星时的严重冲击伤害死亡。你需要能够承受更多伤害才能在这段旅程中幸存。
landing-cutscene-abort-external-mod=（荆岚星）若无更多防护，你无法登陆荆岚星。你使用的 mod 跳过了太空旅行，但仍需满足安全登陆荆岚星的要求。详见荆岚星导览。
promethium_warning=⚠️ 你已研究无限研究增产计划，且荆岚星科技包已添加其中。此设置可在模组设置中切换。该警告在本次存档中不再显示。
promethium_warning-part2=⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️
rocketizer-warning=⚠️ 安装荆岚星前，你的基地里已有 __ENTITY__rci-rocketizer__。默认情况下荆岚星会更改其解锁条件与配方。可在「Mod 设置」中调整。本警告在此存档中不再显示。
rubia-rocket-silo-setting-warning=警告：[entity=logistic-robot] 无法导航至荆岚星的火箭发射井。正在禁用自动物流请求。

