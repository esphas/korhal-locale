[mod-setting-description]
disable-lyrical-music=为有垃圾品味的人开启无障碍模式。默认关闭是玩模组的预期方式。
remove-rubia-from-promethium_sci=如果启用，则钷素科学包的无限研究增产计划科技**不需要**荆岚星科技包。默认关闭。
require-rubia-for-endgame-planets=如果启用，则解锁后期行星（如玄冥星）和模组后期行星（如沧海星）**必须完成荆岚星任务**。默认启用。
rubia-difficulty-setting=调整荆岚星关于垃圾小行星的某些难度方面（生命值、生成频率、伤害等），资源和合成不受影响。默认值为普通。
rubia-rocketizer-early-unlock=与火箭发射井同时解锁火箭装填器（如同未安装荆岚星）。用于在下载荆岚星之前已安装「Rocket Cargo Insertion」的存档兼容。除非适用，请勿启用。默认关闭。
invert-trashsteroid-scaling=翻转垃圾小行星撞击时的缩放方向（变小而非变大）。纯视觉效果。默认关闭。
rubia-megabase-mode=启用后，在生成极大量垃圾小行星时通过使其无法移动来降低 UPS 消耗，但会改变机制。默认关闭。
rubia-tech-cost-multiplier=荆岚星触发类科技不受常规科技成本倍率影响。本设置单独倍率这些科技。数值越大成本越高。默认 1。
rubia-zoom-change=关闭后，滴眼液将无任何效果。默认开启。
rubia-renai-special-trajectories=启用后，放置在荆岚星上的投掷机械臂将使用特殊轨迹。这会增加 Renai Transportation 的 UPS 开销。默认开启。
rubia-buttplug-integration=荆岚星可通过 Intiface Central 与你的 buttplug 交互。启用后，过场动画、风力激活、随机事件或垃圾小行星被摧毁时可能触发。\n\n使用方法：需运行 Intiface Central (https://intiface.com/)。参见 www.buttplug.io 快速入门。需从 GitHub 下载 CuButt 原生连接器并按说明配置 (https://github.com/ashkitten/factorio-cubutt/tree/mistress)。仅兼容 Linux。

