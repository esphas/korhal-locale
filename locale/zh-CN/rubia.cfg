pre-rubia-cutscene-unprepared=你有一种不祥的预感，觉得自己对荆岚星的装备不足，就像出发前忘了读某个关键提示。
pre-rubia-cutscene-unprepared-naked=你感到一阵寒意从脊椎窜起。你完全毫无防备，这次旅程注定死亡。
pre-rubia-cutscene-unprepared-low-shield=你感觉几乎赤身裸体，完全没有足够的保护来活着登陆荆岚星。
