# mod: canal-excavator
# version: 1.14.1

[mod-setting-name]
auto-deconstruct=自动标记拆除
no-tiles=不引入新地块


[mod-setting-description]
auto-deconstruct=当地块被标记挖掘时，自动将其上实体标记为待拆除。
no-tiles=Factorio 地块原型上限为 255。部分 mod（如 Alien Biomes）会大量增加地块，可能触及上限。默认本 mod 新增「可挖地块」与「已挖地块」两种地块；开启后复用原版「精制警示地台」与「精制混凝土」外观。若没有其他 mod 改动这两种地块，则仅为外观差异。


[item-name]
canex-excavator=运河挖掘机
canex-digable=可挖地块


[item-description]
canex-excavator=挖掘已铺设 [item=canex-digable] 的地面，使水流通行。详见游戏内提示。
canex-digable=标记地面，供 [item=canex-excavator] 挖掘。


[recipe-name]
canex-excavator=运河挖掘机
canex-digable=可挖地块


[entity-name]
canex-excavator=运河挖掘机
canex-rsc-digable=可挖资源
canex-rsc-digable-surface=可挖资源 __1__


[entity-description]
canex-rsc-digable=放置 [item=canex-digable] 时生成。
canex-rsc-digable-surface=放置 [item=canex-digable] __1__ 时生成。
canex-on=于 __1__ 上
canex-in=在 __1__ 内


[tile-name]
canex-digable=可挖地块
canex-dug=已挖地块


[tile-description]
canex-dug=与水体相邻时会转变为水（或其他星球对应流体，如祝融星熔岩）。


[technology-name]
canex-excavator=运河挖掘机


[technology-description]
canex-excavator=挖掘河道。


[story]
canex-already-dug=地块已挖完
canex-remaining=剩余：__1__
canex-dug=转化倒计时：__1__
canex-invalid-surface=无法在此地表挖掘
canex-not-on-landfill=不能挖掘填海料
canex-not-in-water=不能挖掘水体


[command]
canex-transition-dug=强制所有已登记待转化的地块立即转化。可修复转化被意外跳过的情况。
canex-reset-partially-dug=清空「部分挖掘后取消」的地块记录表。频繁取消可能导致该表过大。
canex-debug=[surfaceName] — 显示指定表面所有已挖、待转化与部分挖掘地块的状态。
canex-show-surface-config=[surfaceName] — 显示一个或全部表面的配置。
canax-remove-floating=移除下方没有可挖地块的所有挖掘资源实体。其他 mod 删格未通知时可能出现。


[tips-and-tricks-item-description]
canex-excavator-tnt=建造 [entity=canex-excavator] 前须先铺设 [item=canex-digable] 地块，再将挖掘机建在其上。
canex-canals-tnt=[entity=canex-excavator] 挖尽 [item=canex-digable] 上的资源后，邻接水源的已挖地块会转化为水体。\n不限于 [tile=water]；水源类型会被复制。
canex-canals-sa-tnt=\n不同星球挖掘结果可能不同。例如在 [planet=gleba] 会得到 [item=spoilage]。


[tips-and-tricks-item-name]
canex-excavator-tnt=建造运河挖掘机
canex-canals-tnt=挖掘运河


[se]
canex-vita-zones=异种植物区
canex-frozen-zones=冻结区
canex-rocky-zones=岩区
