[technology-description]
ds-megastructure-technology=建造巨型结构的科技。
slp-dyson-sphere=开放式戴森球巨型结构。
ds-energy-interface=打开全息投影仪以监测戴森球的状态。
ds-entangled-core=远距离传输能量的科技，也许不仅仅是能量。在巨型结构等领域潜力巨大。
planet-discovery-sunorbit=你已经靠得这么近了，何不再近一点？
slp-sunpack=欢迎来到真正强大能源的世界。
slp-fuel-mk2=才 40 分钟？那来几个世纪怎么样？！在零重力下加一点硫磺，狂热的等离子体就能工作极长时间！
slp-solar-system-sun2=活跃生产需要更多等离子体，该飞得更近了。
slp-dyson-sphere-grounded=锂的发现使定向键合光束成为可能！现在可以建造中继器，将戴森球的能量传输到行星表面！
ds-energy-loader-mk2=量子处理器使我们能与戴森球建立更稳定的连接，并接入更多卫星节点。
ds-energy-loader-mk3=钷质小行星带来了奇迹。我们进一步改进了能量连接站！

