[entity-description]
ds-energy-interface=显示戴森球当前状态。
ds-energy-loader=从戴森球获取能量（所有世界中的连接站共享能量）。
slp-plasma-asteroid=巨大而炽热的等离子凝块，会损伤太空平台。只能用激光摧毁或使其爆炸。
ds-energy-small-loader=从戴森球获取能量。体积较小，只能从一颗卫星接收能量（约 800 kW）。无法在行星表面工作。
ds-energy-loader-mk1=从戴森球获取能量。可同时连接 50 颗卫星（约 40 MW）。要在地表工作，须先建造能量中继结构。
ds-energy-loader-mk2=从戴森球获取能量。可同时连接 250 颗卫星（约 200 MW）。要在地表工作，须先建造能量中继结构。
ds-energy-loader-mk3=从戴森球获取能量。可同时连接 1000 颗卫星（约 800 MW）。要在地表工作，须先建造能量中继结构。

