[mod-name]
slp-dyson-sphere-reworked=○🌐戴森球重制版 [SLP - Dyson Sphere Reworked]

[mod-description]
slp-dyson-sphere-reworked=当你拥有整颗恒星的能量时，谁还需要聚变反应堆？驾驶星际飞船直入恒星轨道，用全新科技将难以想象的巨大能量输送到你需要的地方。最重要的是，出发前别忘了下船！在恒星旁建造戴森球，彻底告别行星与太空中的其他能源。任何 SLP 模组都依赖本 mod（你也可以试着自己搞出这种能源，祝你好运）。

