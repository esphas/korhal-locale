slp-ds-satellite=发射到轨道或任意平台，将自动送往恒星（平台只会收到空货舱）。
ds-energy-interface=显示戴森球当前状态。
ds-entangled-core=磁场中的一束纠缠粒子。可长距离传输能量，但在行星大气中效果不佳。
slp-plasma-chunk=非常炽热且活跃的等离子碎块，最好尽快使用！
