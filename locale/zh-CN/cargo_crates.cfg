# mod: cargo_crates
# version: 0.12.0

[technology-name]
cargo-crates=货运箱
cargo-crates-zip=压缩包


[technology-description]
cargo-crates=解锁一次性木质货运箱，可将物品紧凑打包运输，需要时再拆包。紧凑包装后，箱内物品仅占用原本 50% 的火箭货舱容量。
TFMG-cargo-crates=考虑更高效的物品包装方式。
cargo-crates-zip=压缩打包物品，以便用火箭运送更多货物。


[item-name]
cargo-crate=货运箱（ __1__ __2__ ）
cargo-crate-zip=__1__ __2__.zip


[recipe-name]
cargo-crate-unpack=拆包货运箱（ __1__ __2__ ）
cargo-crate-unpack-zip=解压 __1__ __2__.zip


[item-group-name]
cargo-crates=货运箱
cargo-crates-zip=压缩包


[mod-setting-name]
cargo-crates-pack-ammo=允许打包弹药
cargo-crates-pack-equipment=允许打包装备
cargo-crates-pack-spoilables=允许打包可变质物品
cargo-crates-pack-capsules=允许打包容囊类物品
use-cargo-crates-zip-texture=使用压缩包外观
cargo-crates-packing-multiplier=货运箱堆叠倍率


[mod-setting-description]
cargo-crates-pack-ammo=允许将弹药装入货运箱。关闭可减少生成的物品与配方数量。
cargo-crates-pack-equipment=允许将装备装入货运箱。关闭可减少生成的物品与配方数量。
cargo-crates-pack-spoilables=允许将可变质物品装入货运箱。关闭可减少生成的物品与配方数量。
cargo-crates-pack-capsules=允许将胶囊类物品装入货运箱。关闭可减少生成的物品与配方数量。\n说明：可食用物品属于胶囊类。
