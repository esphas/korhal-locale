# mod: diesel_machines
# version: 0.4.0

[entity-name]
fast-diesel-inserter=高速柴油机械臂
long-handed-diesel-inserter=柴油加长机械臂
diesel-inserter=加长柴油机械臂
crane-bulk-diesel-inserter=柴油集装起重机
diesel-mining-drill=柴油采矿机
diesel-assembling-machine=柴油组装机
diesel-pump=柴油泵
diesel-offshore-pump=柴油海上泵


[entity-description]
fast-diesel-inserter=柴油发动机驱动，比电动版快得多。
long-handed-diesel-inserter=燃油驱动的加长机械臂。不依赖电网，但需消耗燃料。
crane-bulk-diesel-inserter=重型燃料驱动的集装起重机，专为大宗货物搬运设计。可单次抓取整堆物品。\n非常适合卸载船只或在大型存储容器间转移物品。
diesel-assembling-machine=柴油发动机驱动的多功能组装机。不依赖电网，但需持续消耗燃料。
diesel-pump=液体燃料驱动的坚固泵体。无需电力即可输送流体，适合离网流体处理。
diesel-mining-drill=利用强劲柴油动力开采资源，不依赖电网。可靠但耗油量高。


[technology-name]
diesel-automation=柴油自动化
portable-diesel-generator=便携柴油发电机


[technology-description]
diesel-automation=解锁以液体燃料为动力的机械，替代电力驱动。支持离网自动化，但需持续供应燃料。
portable-diesel-generator=为恶劣环境加固的便携柴油核心。喂入桶装燃料时，输出功率甚至超过裂变反应堆。


